name: Daily Guide Publish

on:
  workflow_dispatch:
    inputs:
      count:
        description: "생성할 가이드 수 (기본 1)"
        required: false
        default: "1"
        type: string
      dry_run:
        description: "Dry-run (저장 없이 미리보기)"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 23 * * *"   # 하루 1회: KST 08:00 시작 (UTC 23:00 전날)

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Random delay (최대 30분, schedule 전용)
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          DELAY=$(( RANDOM % 10 ))
          echo "랜덤 지연: ${DELAY}분 대기"
          sleep "${DELAY}m"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Write environment file
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GUIDES_PER_RUN: ${{ inputs.count || '1' }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        shell: bash
        run: |
          printf 'OPENAI_API_KEY=%s\n'             "$OPENAI_API_KEY"             >> .env
          printf 'OPENAI_MODEL=%s\n'               "$OPENAI_MODEL"               >> .env
          printf 'TAVILY_API_KEY=%s\n'               "$TAVILY_API_KEY"             >> .env
          printf 'SUPABASE_URL=%s\n'               "$SUPABASE_URL"               >> .env
          printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n'  "$SUPABASE_SERVICE_ROLE_KEY"  >> .env
          printf 'GUIDES_PER_RUN=%s\n'             "$GUIDES_PER_RUN"             >> .env
          printf 'X_API_KEY=%s\n'                  "$X_API_KEY"                  >> .env
          printf 'X_API_SECRET=%s\n'               "$X_API_SECRET"               >> .env
          printf 'X_ACCESS_TOKEN=%s\n'             "$X_ACCESS_TOKEN"             >> .env
          printf 'X_ACCESS_TOKEN_SECRET=%s\n'      "$X_ACCESS_TOKEN_SECRET"      >> .env

      - name: Publish guide
        shell: bash
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m scripts.main --dry-run --count "${{ inputs.count || '1' }}"
          elif [ -n "${{ inputs.count }}" ]; then
            python -m scripts.main --count "${{ inputs.count }}" --no-x
          else
            python -m scripts.main --no-x
          fi
